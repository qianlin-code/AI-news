name: CI

on:
  push:
    branches: [main, feature-redis]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # ========== MySQL 8.0 服务容器 ==========
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pwd
          MYSQL_DATABASE: news_app_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=test_root_pwd"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=60s

      # ========== Redis 7 服务容器 ==========
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # ========== 环境变量（覆盖 .env，pydantic-settings 自动读取）==========
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: test_root_pwd
      DB_NAME: news_app_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_DB: 0
      CORS_ORIGINS: http://localhost:5173

    steps:
      # ========== 1. 拉取代码 ==========
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      # ========== 2. 设置 Python ==========
      - name: 🐍 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ========== 3. 安装依赖 ==========
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r toutiao_backend/requirements.txt
          pip install ruff pytest httpx

      # ========== 4. Ruff 代码检查 ==========
      - name: 🔍 Ruff 代码检查
        run: ruff check toutiao_backend/

      # ========== 5. 初始化测试数据库 ==========
      - name: 🗄️ 初始化测试数据库
        run: python toutiao_backend/tests/init_test_db.py

      # ========== 6. 运行测试 ==========
      - name: 🧪 运行测试
        run: pytest toutiao_backend/tests/ -v
